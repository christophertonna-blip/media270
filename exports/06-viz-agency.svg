<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" width="320" height="140">
  <rect width="320" height="140" fill="#FFFFFF"/>
  <!-- subtle grid -->
  <g stroke="#0A0A0A" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="35" x2="320" y2="35"/>
    <line x1="0" y1="70" x2="320" y2="70"/>
    <line x1="0" y1="105" x2="320" y2="105"/>
  </g>
  <!-- line chart -->
  <polyline points="10,110 50,92 90,98 130,72 170,80 210,52 250,46 300,28"
            fill="none" stroke="#FF5E1A" stroke-width="1.8"/>
  <!-- data points -->
  <circle cx="50" cy="92" r="2.5" fill="#0A0A0A"/>
  <circle cx="130" cy="72" r="2.5" fill="#0A0A0A"/>
  <circle cx="210" cy="52" r="2.5" fill="#0A0A0A"/>
  <circle cx="300" cy="28" r="3.5" fill="#FF5E1A"/>
  <!-- crosshair dashes -->
  <g stroke="#0A0A0A" stroke-width="0.4" opacity="0.35" stroke-dasharray="2 3">
    <line x1="300" y1="28" x2="300" y2="130"/>
    <line x1="10" y1="28" x2="300" y2="28"/>
  </g>
  <!-- labels -->
  <text x="10" y="24" font-family="DM Mono, monospace" font-size="9" fill="#0A0A0A" opacity="0.55">+18M</text>
  <text x="10" y="130" font-family="DM Mono, monospace" font-size="9" fill="#0A0A0A" opacity="0.55">W01</text>
  <text x="288" y="130" text-anchor="end" font-family="DM Mono, monospace" font-size="9" fill="#0A0A0A" opacity="0.55">W08</text>
</svg>
