<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" width="320" height="140">
  <rect width="320" height="140" fill="#FFFFFF"/>
  <!-- subtle grid -->
  <g stroke="#0A0A0A" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="35" x2="320" y2="35"/>
    <line x1="0" y1="70" x2="320" y2="70"/>
    <line x1="0" y1="105" x2="320" y2="105"/>
    <line x1="80" y1="0" x2="80" y2="140"/>
    <line x1="160" y1="0" x2="160" y2="140"/>
    <line x1="240" y1="0" x2="240" y2="140"/>
  </g>
  <!-- satellite nodes -->
  <g fill="none" stroke="#0A0A0A" stroke-width="1" opacity="0.45">
    <circle cx="60" cy="40" r="5"/>
    <circle cx="260" cy="45" r="5"/>
    <circle cx="95" cy="100" r="5"/>
    <circle cx="225" cy="95" r="5"/>
    <circle cx="180" cy="60" r="5"/>
  </g>
  <!-- hub center -->
  <circle cx="160" cy="70" r="9" fill="#FF5E1A"/>
  <circle cx="160" cy="70" r="18" fill="none" stroke="#FF5E1A" stroke-width="1" opacity="0.5"/>
  <!-- connection lines -->
  <g stroke="#0A0A0A" stroke-width="0.5" opacity="0.35" stroke-dasharray="2 3">
    <line x1="160" y1="70" x2="60" y2="40"/>
    <line x1="160" y1="70" x2="260" y2="45"/>
    <line x1="160" y1="70" x2="95" y2="100"/>
    <line x1="160" y1="70" x2="225" y2="95"/>
    <line x1="160" y1="70" x2="180" y2="60"/>
  </g>
  <!-- label -->
  <text x="168" y="90" font-family="DM Mono, monospace" font-size="9" fill="#0A0A0A" opacity="0.55">HUB</text>
</svg>
