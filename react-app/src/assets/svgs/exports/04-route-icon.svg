<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <rect width="400" height="120" fill="transparent"/>
  <!-- grid background -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="24" y2="0" stroke="rgba(10,10,10,0.045)" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="24" stroke="rgba(10,10,10,0.045)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="120" fill="url(#grid)"/>
  <!-- card border -->
  <rect x="0.5" y="0.5" width="399" height="119" fill="none" stroke="rgba(10,10,10,0.1)" stroke-width="1"/>
  <!-- street grid lines -->
  <g stroke="currentColor" stroke-width="0.6" opacity="0.45">
    <line x1="0" y1="24" x2="400" y2="24"/>
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="96" x2="400" y2="96"/>
    <line x1="60"  y1="0" x2="60"  y2="120"/>
    <line x1="140" y1="0" x2="140" y2="120"/>
    <line x1="220" y1="0" x2="220" y2="120"/>
    <line x1="300" y1="0" x2="300" y2="120"/>
    <line x1="360" y1="0" x2="360" y2="120"/>
  </g>
  <!-- main boulevard -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="currentColor" stroke-width="1.6" opacity="0.9"/>
  <!-- orange route -->
  <path d="M10,96 L60,96 L60,60 L220,60 L220,24 L300,24 L300,60 L390,60"
        fill="none" stroke="var(--color-orange)" stroke-width="2.2" stroke-linejoin="miter"/>
  <!-- pin 1 — start -->
  <circle cx="10" cy="96" r="5" fill="var(--color-orange)"/>
  <circle cx="10" cy="96" r="9" fill="none" stroke="var(--color-orange)" stroke-width="1" opacity="0.3"/>
  <!-- pin 2 — mid -->
  <circle cx="220" cy="24" r="5" fill="var(--color-orange)"/>
  <circle cx="220" cy="24" r="9" fill="none" stroke="var(--color-orange)" stroke-width="1" opacity="0.3"/>
  <!-- pin 3 — end -->
  <circle cx="390" cy="60" r="5" fill="var(--color-orange)"/>
  <circle cx="390" cy="60" r="9" fill="none" stroke="var(--color-orange)" stroke-width="1" opacity="0.3"/>
</svg>
