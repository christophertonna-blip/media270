<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 240" width="520" height="240">
  <rect width="520" height="240" fill="transparent"/>
  <!-- ground lines -->
  <g stroke="currentColor" stroke-width="0.6" opacity="0.18">
    <line x1="0" y1="200" x2="520" y2="200"/>
    <line x1="0" y1="220" x2="520" y2="220"/>
  </g>
  <!-- width dimension -->
  <g stroke="currentColor" stroke-width="0.8" opacity="0.45">
    <line x1="125" y1="30" x2="475" y2="30"/>
    <line x1="125" y1="24" x2="125" y2="36"/>
    <line x1="475" y1="24" x2="475" y2="36"/>
  </g>
  <text x="300" y="20" text-anchor="middle" font-family="DM Mono, monospace" font-size="11" fill="currentColor" opacity="0.65">3840 mm</text>
  <!-- cab -->
  <rect x="40" y="110" width="85" height="90" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <rect x="52" y="120" width="60" height="40" fill="currentColor" opacity="0.1"/>
  <!-- truck body -->
  <rect x="125" y="50" width="350" height="150" fill="currentColor"/>
  <!-- LED screen (orange) -->
  <rect x="135" y="60" width="330" height="130" fill="var(--color-orange)"/>
  <!-- screen grid overlay -->
  <g stroke="rgba(0,0,0,0.16)" stroke-width="0.6">
    <line x1="135" y1="92" x2="465" y2="92"/>
    <line x1="135" y1="125" x2="465" y2="125"/>
    <line x1="135" y1="158" x2="465" y2="158"/>
    <line x1="190" y1="60" x2="190" y2="190"/>
    <line x1="245" y1="60" x2="245" y2="190"/>
    <line x1="300" y1="60" x2="300" y2="190"/>
    <line x1="355" y1="60" x2="355" y2="190"/>
    <line x1="410" y1="60" x2="410" y2="190"/>
  </g>
  <!-- brand text on screen -->
  <text x="300" y="140" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="800" font-size="66" fill="currentColor" letter-spacing="2">MEDIA270</text>
  <!-- height dimension -->
  <g stroke="currentColor" stroke-width="0.8" opacity="0.45">
    <line x1="488" y1="50" x2="488" y2="200"/>
    <line x1="482" y1="50" x2="494" y2="50"/>
    <line x1="482" y1="200" x2="494" y2="200"/>
  </g>
  <text x="500" y="128" text-anchor="start" font-family="DM Mono, monospace" font-size="11" fill="currentColor" opacity="0.65" transform="rotate(90 500 128)">2240 mm</text>
  <!-- wheels -->
  <circle cx="70" cy="210" r="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="70" cy="210" r="5" fill="currentColor"/>
  <circle cx="360" cy="210" r="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="360" cy="210" r="5" fill="currentColor"/>
  <circle cx="395" cy="210" r="14" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="395" cy="210" r="5" fill="currentColor"/>
</svg>
