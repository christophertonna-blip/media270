document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"tr\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Media270 — Tanıtım Dosyası<\u002Ftitle>\n<style>/* =========================================================================\n   Media270 — Tanıtım PDF v1\n   A4 portrait · bilingual · mixed moods per section\n   ========================================================================= */\n\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal; font-weight: 800; font-display: block;\n  src: url(\"0de13fa7-ee54-4608-9dd7-552296617a1e\") format('truetype');\n}\n@font-face {\n  font-family: 'Rajdhani';\n  font-style: normal; font-weight: 600; font-display: block;\n  src: url(\"233d121a-6c7d-4475-b58e-59a5e696a993\") format('truetype');\n}\n@font-face {\n  font-family: 'DM Mono';\n  font-style: normal; font-weight: 400; font-display: block;\n  src: url(\"37ecf94f-c800-4bbf-ac00-15fcadec971d\") format('truetype');\n}\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal; font-weight: 400; font-display: block;\n  src: url(\"ae58cd53-7207-4cd3-8f96-8a3922f8333f\") format('truetype');\n}\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal; font-weight: 500; font-display: block;\n  src: url(\"53373328-424d-4018-98e1-3de7cf204d0f\") format('truetype');\n}\n\n/* ---------- TOKENS (Operational default) ---------- */\n:root {\n  --bg:           #FFFFFF;\n  --ink:          #0A0A0A;\n  --orange:       #FF5E1A;\n  --orange-hot:   #FF4D00;\n  --cream:        #F5F3EF;\n  --line:         rgba(10,10,10,0.10);\n  --line-strong:  rgba(10,10,10,0.18);\n  --muted:        rgba(10,10,10,0.60);\n  --grid:         rgba(10,10,10,0.045);\n\n  --f-title:  'Barlow Condensed', 'Oswald', Impact, sans-serif;\n  --f-label:  'Rajdhani', 'Saira Condensed', sans-serif;\n  --f-mono:   'DM Mono', ui-monospace, 'SF Mono', monospace;\n  --f-body:   'JetBrains Mono', 'DM Mono', ui-monospace, monospace;\n\n  --grid-size: 36px;\n}\n\n.page[data-mood=\"editorial\"] {\n  --bg:    #F1ECE2;\n  --cream: #E6DECC;\n  --line:  rgba(10,10,10,0.14);\n  --line-strong: rgba(10,10,10,0.22);\n  --grid:  rgba(10,10,10,0);\n}\n\n.page[data-mood=\"night\"] {\n  --bg:    #0A0A0A;\n  --ink:   #FAFAFA;\n  --cream: #141414;\n  --line:  rgba(255,255,255,0.12);\n  --line-strong: rgba(255,255,255,0.22);\n  --muted: rgba(255,255,255,0.55);\n  --grid:  rgba(255,255,255,0.05);\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml, body {\n  background: #E5E2DC;\n  color: #0A0A0A;\n  font-family: var(--f-body);\n  -webkit-font-smoothing: antialiased;\n  -webkit-print-color-adjust: exact;\n  print-color-adjust: exact;\n}\n\na { color: inherit; text-decoration: none; }\n\n.doc {\n  display: flex; flex-direction: column; align-items: center;\n  gap: 18px;\n  padding: 32px 0 64px;\n}\n\n/* ----- PAGE FRAME ----- */\n.page {\n  width: 210mm;\n  height: 297mm;\n  background: var(--bg);\n  color: var(--ink);\n  position: relative;\n  overflow: hidden;\n  box-shadow: 0 2px 16px rgba(0,0,0,0.10), 0 16px 48px rgba(0,0,0,0.08);\n  page-break-after: always;\n  break-after: page;\n  display: flex; flex-direction: column;\n}\n\n.page:last-child { page-break-after: auto; }\n\n/* engineering grid on operational/night pages */\n.page::before {\n  content: \"\"; position: absolute; inset: 0;\n  background-image:\n    linear-gradient(var(--grid) 1px, transparent 1px),\n    linear-gradient(90deg, var(--grid) 1px, transparent 1px);\n  background-size: var(--grid-size) var(--grid-size);\n  pointer-events: none;\n}\n\n/* page-level padding wrapper */\n.page-inner {\n  position: relative; z-index: 1;\n  flex: 1; display: flex; flex-direction: column;\n  padding: 11mm 13mm 8mm;\n}\n\n/* ----- CHROME (header/footer) ----- */\n.chrome-top, .chrome-bot {\n  display: flex; align-items: center; justify-content: space-between;\n  font-family: var(--f-mono); font-size: 8pt;\n  color: var(--muted); letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n.chrome-top {\n  padding-bottom: 4mm;\n  border-bottom: 1px solid var(--line);\n  margin-bottom: 4mm;\n}\n.chrome-bot {\n  padding-top: 3mm;\n  border-top: 1px solid var(--line);\n  margin-top: auto;\n}\n.chrome-top .left, .chrome-bot .left,\n.chrome-top .right, .chrome-bot .right { display: flex; gap: 18px; align-items: center; }\n\n.chrome-logo {\n  display: inline-block;\n  width: 88px; height: 18px;\n  background: url(\"0f85a629-43fc-4b49-9bd5-4c52e748d0ea\") left center / contain no-repeat;\n  vertical-align: middle;\n  font-size: 0; line-height: 0;\n}\n.page[data-mood=\"night\"] .chrome-logo {\n  background-image: url(\"179e271c-3c98-4f9a-be62-b62a094e537e\");\n}\n\n/* ----- TYPE PRIMITIVES ----- */\n.h1, .h2, .h3 {\n  font-family: var(--f-title); font-weight: 800;\n  text-transform: uppercase;\n  line-height: 0.92; letter-spacing: -0.005em;\n  color: var(--ink);\n}\n.h1 { font-size: 56pt; }\n.h2 { font-size: 32pt; }\n.h3 { font-size: 17pt; line-height: 1; }\n\n.label, .eyebrow {\n  font-family: var(--f-label); font-weight: 600;\n  text-transform: uppercase; letter-spacing: 0.16em;\n  font-size: 9pt; color: var(--ink);\n}\n.label.muted { color: var(--muted); }\n.mono { font-family: var(--f-mono); font-size: 8.5pt; letter-spacing: 0.02em; color: var(--muted); }\n.body { font-size: 9.5pt; line-height: 1.55; }\n.lede { font-size: 11pt; line-height: 1.5; color: color-mix(in oklab, var(--ink) 72%, transparent); }\n.small { font-size: 8.5pt; line-height: 1.45; }\n.accent { color: var(--orange); }\n\n/* ----- SECTION EYEBROW ----- */\n.section-eyebrow {\n  display: flex; align-items: center; gap: 14px;\n  color: var(--muted); margin-bottom: 5mm;\n}\n.section-eyebrow .num {\n  font-family: var(--f-mono); font-size: 9pt;\n  color: var(--orange); letter-spacing: 0.02em;\n}\n.section-eyebrow .lbl {\n  font-family: var(--f-label); font-weight: 600;\n  text-transform: uppercase; letter-spacing: 0.18em;\n  font-size: 9pt;\n}\n.section-eyebrow .rule { flex: 1; height: 1px; background: var(--line-strong); }\n\n/* ----- TITLE LOCKUP (TR primary, EN secondary) ----- */\n.lockup .h-tr {\n  font-family: var(--f-title); font-weight: 800;\n  font-size: 30pt; line-height: 0.92; letter-spacing: -0.005em;\n  text-transform: uppercase;\n}\n.lockup .h-tr .accent { color: var(--orange); }\n.lockup .h-en {\n  margin-top: 3mm;\n  font-family: var(--f-title); font-weight: 800;\n  font-size: 13pt; line-height: 0.95; letter-spacing: 0.01em;\n  text-transform: uppercase;\n  color: var(--muted);\n  padding-top: 2.5mm;\n  border-top: 1px solid var(--line);\n  max-width: 130mm;\n}\n\n/* ----- CORNER BRACKETS ----- */\n.brackets { position: relative; }\n.brackets > .br {\n  position: absolute; width: 12px; height: 12px;\n  border: 1.5px solid var(--ink);\n}\n.brackets > .tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }\n.brackets > .tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }\n.brackets > .bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }\n.brackets > .br2 { bottom: -1px; right: -1px; border-left: none; border-top: none; }\n\n/* ----- PANEL ----- */\n.panel {\n  border: 1px solid var(--line-strong);\n  background: var(--bg);\n  position: relative;\n}\n.panel-head {\n  padding: 8px 14px;\n  border-bottom: 1px solid var(--line);\n  display: flex; justify-content: space-between; align-items: center;\n  color: var(--muted);\n  font-family: var(--f-mono); font-size: 8pt; letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n\n/* ----- LIVE / PULSE DOT ----- */\n.pulse-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--orange); }\n\n/* ----- COVER ----- */\n.cover { padding: 16mm 16mm 14mm; flex: 1; display: flex; flex-direction: column; }\n.cover .top { display: flex; justify-content: space-between; align-items: flex-start; }\n.cover .badge {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 6px 10px;\n  border: 1px solid var(--line-strong);\n  font-family: var(--f-mono); font-size: 8pt; letter-spacing: 0.06em;\n  text-transform: uppercase; color: var(--ink);\n}\n.cover .meta-id {\n  font-family: var(--f-mono); font-size: 8pt; color: var(--muted);\n  letter-spacing: 0.04em; text-transform: uppercase; text-align: right;\n  line-height: 1.5;\n}\n.cover .stage { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0; }\n.cover .h-tr {\n  font-family: var(--f-title); font-weight: 800;\n  font-size: 88pt; line-height: 0.88; letter-spacing: -0.01em;\n  text-transform: uppercase;\n}\n.cover .h-tr .accent { color: var(--orange); }\n.cover .sub-tr {\n  margin-top: 10mm; max-width: 140mm;\n  font-size: 11pt; line-height: 1.55;\n  color: color-mix(in oklab, var(--ink) 78%, transparent);\n}\n.cover hr.rule { border: 0; height: 1px; background: var(--line-strong); margin: 10mm 0; }\n.cover .h-en {\n  font-family: var(--f-title); font-weight: 800;\n  font-size: 28pt; line-height: 0.92; letter-spacing: 0;\n  text-transform: uppercase; color: var(--muted);\n}\n.cover .sub-en {\n  margin-top: 5mm; max-width: 140mm;\n  font-size: 9.5pt; line-height: 1.55; color: var(--muted);\n}\n.cover .bottom {\n  display: grid; grid-template-columns: 1fr auto 1fr;\n  gap: 24px; align-items: end;\n  padding-top: 6mm; border-top: 1px solid var(--line);\n  margin-top: 8mm;\n  font-family: var(--f-mono); font-size: 8pt; letter-spacing: 0.04em;\n  text-transform: uppercase; color: var(--muted);\n}\n.cover .bottom .center { text-align: center; }\n.cover .bottom .right { text-align: right; }\n\n/* COVER — orange streak */\n.cover-streak {\n  position: absolute; right: 16mm; top: 38mm;\n  width: 4mm; height: 70mm; background: var(--orange);\n}\n\n/* ----- HERO INTRO (page 01) ----- */\n.intro-grid {\n  display: grid; grid-template-columns: 1.4fr 1fr; gap: 9mm;\n  margin-top: 4mm;\n}\n.intro-body p { margin-bottom: 3mm; font-size: 9pt; line-height: 1.5; }\n.intro-body p:la ry { background: #FF5E1A; border-color: #FF5E1A; }\n.toolbar button.primary:hover { background: #FF4D00; }\n<\u002Fstyle>\n<script src=\"f8f56c1e-36c5-48a7-b1e9-9ac4b3742372\"><\u002Fscript>\n<style>\n  /* ============================================================\n     v3 — bilingual bullets + image slots\n     ============================================================ */\n\n  /* Bilingual title lockup */\n  .lockup-bi {\n    display: flex; flex-direction: column; gap: 3mm;\n  }\n  .lockup-bi .h-tr {\n    font-family: var(--f-title); font-weight: 800;\n    font-size: 36pt; line-height: 0.9; letter-spacing: -0.005em;\n    text-transform: uppercase;\n  }\n  .lockup-bi .h-tr .accent { color: var(--orange); }\n  .lockup-bi .h-en {\n    font-family: var(--f-label); font-weight: 600;\n    font-size: 10pt; letter-spacing: 0.18em;\n    text-transform: uppercase; color: var(--muted);\n    padding-top: 2mm; border-top: 1px solid var(--line);\n    max-width: 130mm;\n  }\n\n  /* Bullet list pattern — paired TR/EN */\n  .bullets { list-style: none; display: flex; flex-direction: column; gap: 3mm; padding: 0; }\n  .bullets > li {\n    display: grid; grid-template-columns: 6mm 1fr;\n    gap: 1mm 3mm; align-items: start;\n  }\n  .bullets > li::before {\n    content: \"→\"; color: var(--orange);\n    font-family: var(--f-mono); font-size: 10pt;\n    padding-top: 0.5mm; grid-row: 1;\n  }\n  .bullets > li .tr {\n    font-family: var(--f-body); font-size: 9.5pt;\n    line-height: 1.4;\n  }\n  .bullets > li .tr strong { color: var(--orange); font-weight: 500; }\n  .bullets > li .en {\n    font-family: var(--f-body); font-size: 7.5pt;\n    line-height: 1.35; color: var(--muted);\n    display: block; grid-column: 2;\n  }\n\n  /* Compact bullets — denser */\n  .bullets-tight > li { gap: 0.5mm 3mm; }\n  .bullets-tight > li .tr { font-size: 9pt; }\n  .bullets-tight > li .en { font-size: 7pt; }\n\n  /* Section header with bilingual subtitle */\n  .sub-en {\n    margin-top: 4mm;\n    font 6px;\n    fill: var(--ink); letter-spacing: 0.02em;\n  }\n  .route-venue { fill: none; stroke: var(--ink); stroke-width: 1.6; }\n  .route-venue-fill { fill: var(--orange); }\n\n  /* moving GPS blip */\n  .route-blip-core { fill: var(--orange); stroke: var(--bg); stroke-width: 1.2; }\n  .route-blip-halo { fill: var(--orange); }\n\n  .route-foot { padding: 3mm 5mm 3.5mm; display: flex; flex-direction: column; }\n  .route-foot .rf-top {\n    display: flex; align-items: center; justify-content: space-between;\n    font-family: var(--f-mono); font-size: 6.5pt;\n    letter-spacing: 0.05em; color: var(--muted); text-transform: uppercase;\n  }\n  .route-foot .rf-zone { color: var(--orange); }\n  .route-foot .rf-name {\n    font-family: var(--f-title); font-weight: 800;\n    font-size: 13.5pt; line-height: 1; text-transform: uppercase;\n    letter-spacing: -0.005em; margin-top: 2mm;\n  }\n  .route-foot .rf-en {\n    margin-top: 1.5mm;\n    font-family: var(--f-label); font-weight: 600;\n    font-size: 7pt; letter-spacing: 0.16em;\n    text-transform: uppercase; color: var(--muted);\n  }\n  .route-foot .rf-meta {\n    margin-top: 3mm; padding-top: 2.5mm;\n    border-top: 1px solid var(--line);\n    display: flex; align-items: center; gap: 3mm;\n    font-family: var(--f-mono); font-size: 7pt;\n    color: var(--muted); letter-spacing: 0.03em;\n  }\n  .route-foot .rf-meta b { color: var(--ink); font-weight: 400; }\n  .route-foot .rf-meta .dot { color: var(--orange); }\n\n  .route-note {\n    margin-top: 4mm; padding-top: 2.5mm;\n    border-top: 1px solid var(--line-strong);\n    display: flex; align-items: center; justify-content: space-between;\n    font-family: var(--f-mono); font-size: 7.5pt;\n    color: var(--muted); letter-spacing: 0.04em;\n  }\n  .route-note .accent { color: var(--orange); }\n\n  /* ============================================================\n     ROUTE EMBED — tek kutu, gömülü canlı harita (rota_gezgini)\n     ============================================ ; animation: none !important; }\n    .route-comet, .route-blip { display: none !important; }\n    .route-map .live .pulse-dot { animation: none !important; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"doc\">\n\n<!-- ============================================================\n     PAGE 09 · ARAÇ (NIGHT)\n============================================================ -->\n<section class=\"page\" data-mood=\"night\" data-screen-label=\"09 Araç\">\n  <div class=\"page-inner\">\n    <div class=\"chrome-top\">\n      <div class=\"left\">\n        <span class=\"chrome-logo\" role=\"img\" aria-label=\"Media270\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"right\"><span>TANITIM · MAYIS 2026<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section-eyebrow\">\n      <span class=\"num\">/ 07<\u002Fspan>\n      <span class=\"lbl\">ARAÇ · THE VEHICLE<\u002Fspan>\n      <span class=\"rule\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"lockup-bi\">\n      <div class=\"h-tr\">Tekerlekler üstünde<br>9.92 metre <span class=\"accent\">ekran.<\u002Fspan><\u002Fdiv>\n      <div class=\"h-en\" lang=\"en\">A 9.92-METER SCREEN ON WHEELS.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"veh-hero brackets\">\n      <span class=\"br tl\"><\u002Fspan><span class=\"br tr\"><\u002Fspan><span class=\"br bl\"><\u002Fspan><span class=\"br br2\"><\u002Fspan>\n      <image-slot id=\"veh-hero\" shape=\"rect\" placeholder=\"Araç · gece · şehirde · LED açık\" fit=\"cover\"><\u002Fimage-slot>\n    <\u002Fdiv>\n    <div class=\"veh-cap\">\n      <span>GECE YAYINI · İSTANBUL<\u002Fspan>\n      <span class=\"accent\">LED CANLI · 6500 CD/M²<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"veh-duo\">\n      <figure>\n        <image-slot id=\"veh-event\" shape=\"rect\" placeholder=\"Etkinlik / venue çevresinde araç\" fit=\"cover\"><\u002Fimage-slot>\n        <figcaption>\n          <span>ETKİNLİK ÇEVRESİ · VENUE<\u002Fspan>\n          <span class=\"accent\" lang=\"en\">ON-S
