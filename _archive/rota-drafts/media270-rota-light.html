/* ===== KOD ===== */
function smoothNetwork(fc){
  const feats = fc.features.map(f=>{
    let s = f;
    try { s = turf.simplify(f, { tolerance:CONFIG.simplifyTol, highQuality:true }); } catch(e){}
    try { s = turf.bezierSpline(s, { sharpness:CONFIG.smoothSharpness, resolution:10000 }); } catch(e){}
    return s;
  });
  return { type:'FeatureCollection', features:feats };
}

if (!CONFIG.token || !CONFIG.token.startsWith('pk.')) {
  document.getElementById('warn').style.display = 'flex';
} else {
  mapboxgl.accessToken = CONFIG.token;
  const map = new mapboxgl.Map({ container:'map', style:CONFIG.style, center:[29.02,41.065], zoom:12, pitch:0, bearing:0, attributionControl:false });

  map.on('load', () => {
    const ROUTE = smoothNetwork(ROUTE_RAW);
    map.addSource('route', { type:'geojson', data:ROUTE });

    map.addLayer({ id:'route-glow', type:'line', source:'route',
      layout:{ 'line-cap':'round','line-join':'round' },
      paint:{ 'line-color':CONFIG.lineColor, 'line-width':8, 'line-opacity':0.35, 'line-blur':4 } });
    map.addLayer({ id:'route-core', type:'line', source:'route',
      layout:{ 'line-cap':'round','line-join':'round' },
      paint:{ 'line-color':CONFIG.lineColor, 'line-width':CONFIG.lineWidth, 'line-opacity':1 } });

    if (CONFIG.hideBasemapLabels) {
      map.getStyle().layers.forEach(ly => { if (ly.type === 'symbol') map.setLayoutProperty(ly.id, 'visibility', 'none'); });
    }

    // Muhit etiketleri (birincil)
    DISTRICTS.forEach(l => {
      const el = document.createElement('div');
      el.className = 'district';
      el.innerHTML = '<span class="tick"></span><span class="name">'+l.name+'</span>';
      new mapboxgl.Marker({ element:el, anchor:'left', offset:[10,0] }).setLngLat(l.coord).addTo(map);
    });
    // Cadde etiketleri (ikincil)
    if (CONFIG.showStreets) {
      STREETS.forEach(l => {
        const el = document.createElement('div');
        el.className = 'street';
        el.textContent = l.name;
        new mapboxgl.Marker({ element:el, anchor:'center' }).setLngLat(l.coord).addTo(map);
      });
    }

    const bb = turf.bbox(ROUTE);
    const cam = map.cameraForBounds([[bb[0],bb[1]],[bb[2],bb[3]]], { padding:{ top:150, bottom:150, left:150, right:150 } });
    map.jumpTo({ center:cam.center, zoom:cam.zoom, bearing:CONFIG.bearing, pitch:CONFIG.pitch });

    if (CONFIG.pulse) {
      function frame(t){
        const phase = (Math.sin(t/650) + 1) / 2;
        map.setPaintProperty('route-glow','line-width', 8 + phase*22);
        map.setPaintProperty('route-glow','line-opacity', 0.40 * (1 - phase));
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }
  });
}
