      <line x1="0" y1="0" x2="24" y2="0" stroke="rgba(10,10,10,0.045)" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="24" stroke="rgba(10,10,10,0.045)" stroke-width="1"/>
    </pattern>
