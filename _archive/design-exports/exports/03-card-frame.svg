<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 540" width="440" height="540">
  <!-- background -->
  <rect width="440" height="540" fill="#FFFFFF"/>
  <!-- grid background -->
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="24" y2="0" stroke="rgba(10,10,10,0.045)" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="24" stroke="rgba(10,10,10,0.045)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="440" height="540" fill="url(#grid)"/>
  <!-- card border -->
  <rect x="0.5" y="0.5" width="439" height="539" fill="none" stroke="rgba(10,10,10,0.18)" stroke-width="1"/>
  <!-- corner marks — top-left -->
  <polyline points="0,18 0,0 18,0" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
  <!-- corner marks — top-right -->
  <polyline points="422,0 440,0 440,18" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
  <!-- corner marks — bottom-left -->
  <polyline points="0,522 0,540 18,540" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
  <!-- corner marks — bottom-right -->
  <polyline points="422,540 440,540 440,522" fill="none" stroke="#0A0A0A" stroke-width="1.5"/>
</svg>
