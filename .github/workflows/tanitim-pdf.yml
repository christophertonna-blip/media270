name: Tanıtım PDF

on:
  push:
    branches: [main]
    paths:
      - 'tanitim_sayfasi/index.html'
      - 'tanitim_sayfasi/styles.css'
      - 'tanitim_sayfasi/fonts/**'
      - 'tanitim_sayfasi/image-slot.js'
      - 'tanitim_sayfasi/.image-slots.state.json'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run generate:pdf

      - name: Commit regenerated PDF if changed
        run: |
          if git diff --quiet -- tanitim_sayfasi/Media270-Tanitim-Dosyasi.pdf; then
            echo "PDF unchanged, nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tanitim_sayfasi/Media270-Tanitim-Dosyasi.pdf
          git commit -m "chore: regenerate tanıtım PDF [skip ci]"
          git push
