25],[29.08833,40.95519],[29.0884,40.95516],[29.0885,40.95511],[29.08862,40.95504],[29.08873,40.95496],[29.08885,40.95487],[29.08894,40.95479],[29.08901,40.95473],[29.08915,40.95459],[29.08926,40.95446],[29.08937,40.95433],[29.08969,40.95382],[29.08976,40.95371],[29.09003,40.95322],[29.09013,40.95308],[29.09016,40.95303],[29.09023,40.95294],[29.09033,40.95285],[29.09035,40.95283],[29.09041,40.95277],[29.09048,40.95272],[29.09055,40.95267],[29.09062,40.95264],[29.09069,40.9526],[29.09077,40.95257],[29.09083,40.95255],[29.09096,40.95251],[29.0911,40.95248],[29.09122,40.95248],[29.09128,40.95248],[29.09134,40.95248],[29.09143,40.95248],[29.09159,40.9525],[29.09186,40.95253],[29.09197,40.95255],[29.09229,40.95261],[29.09247,40.95264],[29.09285,40.95268],[29.09294,40.95269],[29.093,40.95269],[29.09314,40.9527],[29.09327,40.9527],[29.0934,40.95268],[29.09351,40.95267],[29.09377,40.95263],[29.09378,40.95263],[29.09409,40.95254],[29.09425,40.95249],[29.0945,40.9524],[29.09467,40.95235],[29.09474,40.95234],[29.09486,40.95235],[29.09504,40.95237],[29.09543,40.95241],[29.09558,40.95243],[29.09561,40.95243],[29.09575,40.95243],[29.0959,40.95241],[29.09612,40.95235],[29.0963,40.95231],[29.09639,40.95227],[29.09641,40.95226],[29.09661,40.95212],[29.09686,40.95195],[29.09704,40.95181],[29.09716,40.95171],[29.0977,40.9513],[29.09772,40.95128],[29.09784,40.9512],[29.09818,40.95095],[29.09834,40.95084],[29.09871,40.95046],[29.09877,40.95039],[29.09905,40.94988],[29.09915,40.94971],[29.0993,40.94949],[29.09933,40.94942],[29.09936,40.94936],[29.09943,40.94924],[29.09951,40.94911],[29.09954,40.94905],[29.09961,40.94893],[29.09972,40.94877],[29.09983,40.94862],[29.09992,40.94857],[29.10001,40.94853],[29.10008,40.9485],[29.10014,40.94848],[29.10023,40.94846],[29.1003,40.94846],[29.10037,40.94847],[29.1004,40.94848],[29.10042,40.9485],[29.10044,40.94853],[29.10045,40.94857],[29.10044,40.94862],[29.10043,40.94869],[29.10019,40.94903],[29.09962,40.94971],[29.09931,40.95014],[29.09909,40.95036],[29.0979,40.95134],[29.09739,40.95173],[29.0973,40.9518],[29.09717,40.9519],[29.09594,40.95283],[29.09581,40.95295]],"labels":[{"name":"BOSTANCI","coords":[29.09581,40.95295]},{"name":"SUADİYE","coords":[29.08595,40.95776]},{"name":"ŞAŞKINBAKKAL","coords":[29.07481,40.96351]},{"name":"CADDEBOSTAN","coords":[29.06281,40.96989]},{"name":"FENERBAHÇE","coords":[29.04894,40.97664]},{"name":"KALAMIŞ","coords":[29.04186,40.98095]},{"name":"BAĞDAT CADDESİ","coords":[29.06165,40.9652]}]}];
const isMobile = window.matchMedia('(max-width:640px)').matches;
const C=id=>document.getElementById(id);
const clone=o=>JSON.parse(JSON.stringify(o));
function showErr(html){ const b=C('errbar'); b.innerHTML=html; b.style.display='block'; }

if (!CONFIG.token || !CONFIG.token.startsWith('pk.')) {
  showErr("Mapbox token yok. Dosyadaki <b>CONFIG.token</b> alanina pk. ile baslayan token'ini yapistir.");
} else {
  let map=null, curIdx=-1, drawToken=0, headMarker=null, nameMarkers=[], activePts=[], followActive=false, drawPaused=false;
  const FZ=isMobile?CONFIG.followZoom-1:CONFIG.followZoom;
  function smooth(c){ let f=turf.lineString(c); try{f=turf.simplify(f,{tolerance:CONFIG.simplifyTol,highQuality:true});}catch(e){} return f; }
  function trap(p){ const k=CONFIG.rampK, v=1/(1-k); if(p<k) return v*p*p/(2*k); if(p<=1-k) return v*(p-k/2); const q=1-p; return 1 - v*q*q/(2*k); }
  const padNum=()=>isMobile?45:130;
  function setControls(s){ const sh=(id,v)=>C(id).style.display=v?'inline-flex':'none';
    sh('btn-preview',s==='ready'); sh('btn-pause',s==='playing'||s==='paused');
    sh('btn-replay',s==='playing'||s==='paused'||s==='done'); sh('btn-stop',s==='playing'||s==='paused'||s==='done');
    if(s==='playing') C('btn-pause').textContent='⏸ Durdur'; if(s==='paused') C('btn-pause').textContent='▶ Devam'; }

  // 1) ROTALARI HARITADAN BAGIMSIZ HAZIRLA (turf yeter) -> menu her halukarda kurulur
  ROUTES.forEach(r=>{
    r.line=smooth(r.coords); r.length=turf.length(r.line,{units:'kilometers'});
    const pts=r.labels.map(l=>{ const sn=turf.nearestPointOnLine(r.line,turf.point(l.coords),{units:'kilometers'});
      return {name:l.name, along:sn.properties.location, pos:sn.geometry.coordinates, el:null, lbl:null, item:null}; });
    pts.sort((a,b)=>a.along-b.along);
    pts.forEach((p,i)=>p.alt=(i%2!==0));
    r.pts=pts;
  });
  buildMenu();   // <-- artik load beklemiyor
  function setMenu(open){ C('menu').classList.toggle('open',open); C('menu-toggle').innerHTML=open?'✕':'☰'; }
  C('menu-toggle').onclick=()=>setMenu(!C('menu').classList.contains('open'));

  function buildMenu(){ const menu=C('menu'); menu.innerHTML='';
    ROUTES.forEach((r,i)=>{ const g=document.createElement('div'); g.className='route-group';
      const b=document.createElement('button'); b.className='route-btn'; b.dataset.i=i;
      b.innerHTML='<span class="code">'+r.code+'</span><span class="meta"><span class="nm">'+r.name+'</span><span class="sb">'+r.sub+'</span></span>';
      b.onclick=()=>selectRoute(i);
      const dd=document.createElement('div'); dd.className='dropdown';
      r.pts.forEach(p=>{ const it=document.createElement('div'); it.className='drop-item';
        it.innerHTML='<span class="pn">'+p.name+'</span>'; dd.appendChild(it); p.item=it; });
      r.dropdown=dd; g.appendChild(b); g.appendChild(dd); menu.appendChild(g); });
    const rb=document.createElement('button'); rb.id='reset'; rb.textContent='↺ Genel Görünüm'; rb.onclick=resetView; menu.appendChild(rb); }

  // 2) HARITA
  mapboxgl.accessToken = CONFIG.token;
  try {
    map = new mapboxgl.Map({ container:'map', style:CONFIG.style, center:[29.03,41.05], zoom:isMobile?10:11, pitch:0, bearing:0, projection:'mercator', attributionControl:false });
  } catch(err){ showErr("Harita olusturulamadi: "+err.message); }

  if(map){
    // 3) HATAYI EKRANDA GOSTER (token/ag sorunlari icin)
    map.on('error',(e)=>{
      const err=e&&e.error?e.error:{}; const st=err.status; const msg=err.message||'Harita yuklenemedi';
      if(st===401||st===403||/unauthor|access token|forbidden|token/i.test(msg)){
        showErr("Mapbox token REDDEDILDI ("+(st||'401')+"). Sebep genelde token'a eklenmis <b>URL kisitlamasi</b>. "+
                "Yerelde (file://) test icin token KISITSIZ olmali. Mapbox Console > token > URL restrictions kismini bosalt, ya da yeni kisitsiz public token uret.");
      } else { showErr("Harita hatasi: "+msg); }
    });
    map.on('load', () => {
      map.addSource('all',{type:'geojson',data:{type:'FeatureCollection',features:ROUTES.map(r=>clone(r.line))},tolerance:0});
      map.addLayer({id:'all-dim',type:'line',source:'all',layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':CONFIG.lineColor,'line-width':3,'line-opacity':0.22}});
      map.addSource('faint',{type:'geojson',data:{type:'FeatureCollection',features:[]},tolerance:0});
      map.addLayer({id:'route-faint',type:'line',source:'faint',layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':CONFIG.lineColor,'line-width':CONFIG.faintWidth,'line-opacity':CONFIG.faintOpacity}});
      map.addSource('active',{type:'geojson',data:{type:'FeatureCollection',features:[]},tolerance:0});
      map.addLayer({id:'route-core',type:'line',source:'active',layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':CONFIG.lineColor,'line-width':CONFIG.boldWidth,'line-opacity':1}});
      if(CONFIG.hideBasemapLabels){ map.getStyle().layers.forEach(ly=>{ if(ly.type==='symbol') map.setLayoutProperty(ly.id,'visibility','none'); }); }
      // muhit noktalari (markerlari simdi yarat, pt'ye bagla)
      ROUTES.forEach(r=>{ r.pts.forEach(p=>{
        const w=document.createElement('div'); w.className='poi-wrapper';
        const el=document.createElement('div'); el.className='poi';
        el.innerHTML='<span class="lbl'+(p.alt?' alt':'')+'">'+p.name+'</span>';
        w.appendChild(el);
        new mapboxgl.Marker({element:w,anchor:'center'}).setLngLat(p.pos).addTo(map);
        p.el=w; p.lbl=el.querySelector('.lbl');
      }); });
      const hel=document.createElement('div'); hel.className='head-dot';
      headMarker=new mapboxgl.Marker({element:hel,anchor:'center'}).setLngLat([29.02,41.06]).addTo(map); hel.style.display='none';
      ROUTES.forEach((r,ri)=>{ const mid=turf.along(r.line,r.length/2,{units:'kilometers'}).geometry.coordinates;
        const el=document.createElement('div'); el.className='route-name';
        el.innerHTML='<span class="c">'+r.code+'</span><span class="n">'+r.name+'</span>'; el.onclick=()=>selectRoute(ri);
        new mapboxgl.Marker({element:el,anchor:'center'}).setLngLat(mid).addTo(map); nameMarkers.push(el); });
      resetView();
    });
  }

  function markActiveBtn(i){ document.querySelectorAll('.route-btn').forEach(b=>b.classList.toggle('active',+b.dataset.i===i)); }
  function openDropdown(i){ ROUTES.forEach((r,k)=>r.dropdown.classList.toggle('open',k===i)); }
  function showNames(s){ nameMarkers.forEach(el=>el.classList.toggle('hidden',!s)); }
  function hideAllPts(){ ROUTES.forEach(r=>r.pts.forEach(p=>{ if(p.el)p.el.style.display='none'; if(p.lbl)p.lbl.style.opacity=0; if(p.item)p.item.classList.remove('active'); })); }
  function clearActive(){ if(map)map.getSource('active').setData({type:'FeatureCollection',features:[]}); if(headMarker)headMarker.getElement().style.display='none'; }

  function resetView(){ if(!map)return; setMenu(false); curIdx=-1; drawToken++; markActiveBtn(-1); openDropdown(-1); clearActive(); setControls('hidden');
    map.getSource('faint').setData({type:'FeatureCollection',features:[]});
    hideAllPts(); showNames(true); map.setPaintProperty('all-dim','line-opacity',0.22);
    const bb=turf.bbox({type:'FeatureCollection',features:ROUTES.map(r=>r.line)});
    map.flyTo({...map.cameraForBounds([[bb[0],bb[1]],[bb[2],bb[3]]],{padding:padNum()}),pitch:18,bearing:0,duration:2200}); }

  function selectRoute(i){ if(!map)return; setMenu(false); curIdx=i; markActiveBtn(i); openDropdown(i); drawToken++; clearActive(); followActive=false; drawPaused=false;
    map.setPaintProperty('all-dim','line-opacity',0); showNames(false);
    map.getSource('faint').setData(clone(ROUTES[i].line));
    hideAllPts(); ROUTES[i].pts.forEach(p=>{ if(p.el)p.el.style.display='block'; });
    activePts=ROUTES[i].pts;
    const bb=turf.bbox(ROUTES[i].line);
    map.flyTo({...map.cameraForBounds([[bb[0],bb[1]],[bb[2],bb[3]]],{padding:padNum()}),pitch:CONFIG.routePitch,bearing:0,duration:CONFIG.zoomWholeMs});
    setControls('ready'); }

  function resetReveal(){ activePts.forEach(p=>{ if(p.lbl)p.lbl.style.opacity=0; if(p.item)p.item.classList.remove('active'); }); }
  function startPreview(){ if(curIdx<0||!map) return; const i=curIdx; drawPaused=false;
    resetReveal(); clearActive(); showNames(false);
    const start=ROUTES[i].line.geometry.coordinates[0]; followActive=false;
    map.easeTo({center:start,zoom:FZ,pitch:CONFIG.previewPitch,bearing:0,duration:CONFIG.zoomStartMs});
    map.once('moveend',()=>{ followActive=true; });
    startDraw(i); setControls('playing'); }

  function stopReset(){ if(!map)return; drawToken++; drawPaused=false; clearActive(); resetReveal();
    const bb=turf.bbox(ROUTES[curIdx].line);
    map.flyTo({...map.cameraForBounds([[bb[0],bb[1]],[bb[2],bb[3]]],{padding:padNum()}),pitch:CONFIG.routePitch,bearing:0,duration:1000});
    setControls('ready'); }

  function startDraw(i){ drawToken++; const myToken=drawToken;
    const line=ROUTES[i].line, total=ROUTES[i].length;
    const dur=Math.max(CONFIG.drawMinMs, total*CONFIG.drawMsPerKm);
    headMarker.getElement().style.display='block';
    if(activePts[0]){ if(activePts[0].lbl)activePts[0].lbl.style.opacity=1; if(activePts[0].item)activePts[0].item.classList.add('active'); }
    let elapsed=0,lastTs=null;
    function frame(ts){ if(myToken!==drawToken) return;
      if(lastTs==null) lastTs=ts; const dt=ts-lastTs; lastTs=ts; if(!drawPaused) elapsed+=dt;
      const p=Math.min(elapsed/dur,1); const dist=Math.max(total*trap(p),0.0001);
      map.getSource('active').setData(turf.lineSliceAlong(line,0,dist,{units:'kilometers'}));
      const head=turf.along(line,dist,{units:'kilometers'}).geometry.coordinates; headMarker.setLngLat(head);
      activePts.forEach(pp=>{ if(pp.along<=dist){ if(pp.lbl)pp.lbl.style.opacity=1; if(pp.item)pp.item.classList.add('active'); } });
      if(CONFIG.cameraFollow && followActive && !drawPaused){ const c=map.getCenter();
        map.setCenter([c.lng+(head[0]-c.lng)*CONFIG.followLerp, c.lat+(head[1]-c.lat)*CONFIG.followLerp]); }
      if(p<1) requestAnimationFrame(frame); else { headMarker.getElement().style.display='none'; setControls('done'); }
    }
    requestAnimationFrame(frame); }

  C('btn-preview').onclick=startPreview;
  C('btn-replay').onclick=startPreview;
  C('btn-stop').onclick=stopReset;
  C('btn-pause').onclick=()=>{ drawPaused=!drawPaused; setControls(drawPaused?'paused':'playing'); };
}
</script></body></html>
